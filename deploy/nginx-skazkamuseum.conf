# nginx server block for skazkamuseum.ru — matches this VPS's existing pattern.
# Place at /etc/nginx/sites-available/skazkamuseum.ru and symlink into sites-enabled,
# then: certbot --nginx -d skazkamuseum.ru -d www.skazkamuseum.ru
# (certbot rewrites the :80 block to redirect to https and adds the ssl config).

server {
    listen 80;
    server_name skazkamuseum.ru www.skazkamuseum.ru;
    # certbot will add the 301 redirect to https here.

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve uploaded images directly (optional optimization).
    location /uploads/ {
        alias /var/www/skazkamuseum/public/uploads/;
        expires 30d;
        access_log off;
    }
}
